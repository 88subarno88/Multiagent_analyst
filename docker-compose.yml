# One command to stand up the memory plane:  docker compose up -d
# Brings up Postgres with the pgvector extension preinstalled.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dra_postgres
    environment:
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
      POSTGRES_DB: research
    ports:
      - "5432:5432"
    volumes:
      - dra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research"]
      interval: 5s
      timeout: 5s
      retries: 5



volumes:
  dra_pgdata: